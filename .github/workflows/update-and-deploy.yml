name: Update Simulation from News & Deploy

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news and update simulation parameters
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_VERSION: v1beta
          GEMINI_MODEL: gemini-2.5-flash
          ACLED_USERNAME: ${{ secrets.ACLED_USERNAME }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
          LIVEUAMAP_FEED_URL: ${{ vars.LIVEUAMAP_FEED_URL }}
          IEA_API_KEY: ${{ secrets.IEA_API_KEY }}
          IEA_DATA_URL: ${{ vars.IEA_DATA_URL }}
          OWID_ENERGY_DATA_URL: ${{ vars.OWID_ENERGY_DATA_URL }}
        run: |
          echo "GEMINI_API_KEY is set: $([ -n "$GEMINI_API_KEY" ] && echo YES || echo NO)"
          node scripts/update-from-news.mjs

      - name: Build static site
        run: npm run build

      - name: Commit updated parameters
        id: commit_updates
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Simulation Auto-Updater"
          git add src/engine/latestSnapshot.js public/update-meta.json
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git commit -m "auto: update simulation from latest news $(date -u '+%Y-%m-%d %H:%M UTC')"

          for attempt in 1 2 3; do
            git fetch origin main

            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "Auto-update commit pushed successfully."
                exit 0
              fi
            else
              git rebase --abort || true
            fi

            echo "Retrying auto-update push after remote changes (attempt ${attempt}/3)..."
            sleep 5
          done

          echo "Unable to push the auto-update commit after multiple retries."
          exit 1

      - name: Deploy to Cloudflare
        if: ${{ success() || steps.commit_updates.outcome == 'failure' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: |
          if [ -n "$OPENSKY_CLIENT_ID" ]; then
            printf '%s' "$OPENSKY_CLIENT_ID" | npx wrangler@4.68.0 secret put OPENSKY_CLIENT_ID --config wrangler.jsonc
          fi
          if [ -n "$OPENSKY_CLIENT_SECRET" ]; then
            printf '%s' "$OPENSKY_CLIENT_SECRET" | npx wrangler@4.68.0 secret put OPENSKY_CLIENT_SECRET --config wrangler.jsonc
          fi
          if [ -n "$AISSTREAM_API_KEY" ]; then
            printf '%s' "$AISSTREAM_API_KEY" | npx wrangler@4.68.0 secret put AISSTREAM_API_KEY --config wrangler.jsonc
          fi
          npx wrangler@4.68.0 deploy --config wrangler.jsonc

      - name: Note snapshot push failure
        if: ${{ steps.commit_updates.outcome == 'failure' }}
        run: echo "::warning::Snapshot deploy succeeded, but the auto-update commit could not be pushed back to main."
