name: Update Simulation from News & Deploy

on:
  # Run every 4 hours
  schedule:
    - cron: '17 */4 * * *'
  # Also allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news and update simulation parameters
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/update-from-news.mjs

      - name: Build static site
        run: npx vite build

      - name: Commit updated parameters
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Simulation Auto-Updater"
          git add src/engine/actors.js src/engine/SimulationEngine.js
          git diff --staged --quiet || git commit -m "auto: update simulation from latest news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=iran-war-simulation
