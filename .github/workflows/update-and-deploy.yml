name: Update Simulation from News & Deploy

on:
  schedule:
    - cron: '17 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news and update simulation parameters
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "GEMINI_API_KEY is set: $([ -n "$GEMINI_API_KEY" ] && echo YES || echo NO)"
          node scripts/update-from-news.mjs

      - name: Build static site
        run: npx vite build

      - name: Commit updated parameters
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Simulation Auto-Updater"
          git add src/engine/actors.js src/engine/SimulationEngine.js
          git diff --staged --quiet || git commit -m "auto: update simulation from latest news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Deploy to Cloudflare
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy dist --name=iranuswarsim
